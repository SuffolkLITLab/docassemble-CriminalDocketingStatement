id: Criminal_docketing_statement
continue button field: criminal_docketing_statement_intro
question: |
  Criminal Docketing Statement
subquestion: |

  This interview will help you get a Criminal Docketing Statement.

    This page will help you to fill out a Criminal Docketing Statement to the Appeals Court. If you are appealing a judgment of your case, you should submit this form within 14 days of the Notice of Entry of the Appeal.
  
  It helps to have court information about your trial court case being appealed with you now, as you complete this form.

  Each appellant or cross-appellant, other than a self-represented litigant who is incarcerated, is required to submit the attached docketing statement within fourteen days of issuance of the notice of entry of the appeal. See M.A.C. Rule 10.0.

  Most people take about 30 minutes to complete this interview.
  
