id: nature_of_appeal
question: |
   Select the nature of the appeal
subquestion: |
  A **Commonwealth’s Appeal** is when the prosecution, not the defendant, is the party appealing.

  A **Defendant’s Direct Appeal** is the first appeal a defendant files after being convicted or sentenced.

  A **Defendant’s Collateral Appeal** is different from a direct appeal. It is usually filed after the direct appeal has been decided or after the time to file one has passed. It is called collateral because it challenges the conviction through a separate post-conviction process rather than through the standard direct appeal.

fields:
  - Nature of the appeal: nature_of_appeal
    datatype: radio
    choices:
      - Commonwealth's Appeal: commonwealth
      - Defendant's Direct Appeal: direct
      - Defendant's Collateral Appeal: collateral
---
id: appeal_taken_from
question: |
   What type of decision are you appealing?
subquestion: |
  Choose the stage of the case or type of decision you are asking the Appeals Court to review.
fields:
  - Appeal taken from: appeal_taken_from
    datatype: checkboxes
    choices:
      - Pretrial Order: pretrial
      - Jury Trial: jury
      - Non-Jury Trial: non_jury
      - Post-Conviction Order: post_conviction
    none of the above: False
---
id: motion_suppress
question: |
  Motion to suppress 
subquestion: |
  A motion to suppress is a request made to the court, typically by the defendant, asking the judge to exclude certain evidence from being used at trial because it was obtained in violation of the defendant’s constitutional or statutory rights.

  If the judge grants the motion, the prosecution cannot use that evidence at trial. If the judge denies the motion, the evidence is admitted, but the defendant may challenge that ruling on appeal.
 
fields:
  - Does the appeal involve a motion to suppress?: motion_suppress
    datatype: yesnoradio
  - note: |
      When a judge “enters findings” on a motion to suppress, the judge makes an official record explaining both what facts the court believes occurred and how the law applies to those facts.
    show if: 
      variable: motion_suppress
      is: True 
  - Did the judge enter findings?: motion_findings
    datatype: yesnoradio
    show if: 
      variable: motion_suppress
      is: True
  - note: |
      Findings can be **written** in a formal order or spoken in court and later typed up in a transcript (**transcribed**).
    show if:
      variable: motion_findings
      is: True   
  - Are the findings written or transcribed?: findings_type
    datatype: radio
    choices:
      - Written: written
      - Transcribed: transcribed
    show if:
      variable: motion_findings
      is: True
 
