comment: |
  Controls order and branching logic for questions specific to this form
id: interview_order_criminal_docketing_statement
code: |
  # Set the allowed courts for this interview
  allowed_courts = []
  # Below sets the user_role and user_ask_role by asking a question.
  # You can set user_ask_role directly instead to either 'plaintiff' or 'defendant'
  
  users.there_is_another = False

   # user information
  
  filer_role
  users[0].name.first
  if filer_role == "attorney":
    appellant_name
    attorney_bbo

  users[0].address.address
  users[0].phone_number

  
  appellant_is_defendant
  defendant_incarcerated
  if appellant_is_defendant and filer_role == "pro_se":
    defendant_address = users[0].address
  else:
    defendant_address.address
  
  #   # case info
  appeals_docket_number
  case_caption
  court_department 
  lower_docket_number

  # # judge information
  info_judge1
  more_judges_1

  if has_judge2:
    info_judge2
    more_judges_2
  else:
    judge2 = judge2_role = "N/A"
    judge3 = judge3_role = "N/A"

  if has_judge2 and has_judge3:
    info_judge3
  else:
    judge3 = judge3_role = "N/A"

   # impoundement info  
  record_impounded
  if record_impounded:
    fully_impounded
    impoundment_documents
    impoundment_details

  # # case and appeal information
  nature_of_case
  if nature_of_case == "Possession, Other": 
    possession_other
  nature_of_appeal
  appeal_taken_from
  motion_suppress
  if motion_suppress: 
    findings_type
  offense_information
  # defendant_incarcerated
  # defendant_address
  if sentence_stayed:
    stay_order_date

  # # related appeals details 
  related_appeals_parties
  related_appeals_issues
  if related_appeals_issues or related_appeals_parties:
    related_appeals_details

  # # certificate of service 
  service_type
  parties_to_be_served
  service_date
  
  # # actual signature 
  users[0].signature
  
  interview_order_criminal_docketing_statement = True
