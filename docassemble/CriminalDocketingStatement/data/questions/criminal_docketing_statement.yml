# ALDocument objects specify the metadata for each template
objects:
  - criminal_docketing_statement_Post_interview_instructions: ALDocument.using(title="Instructions", filename="criminal_docketing_statement_next_steps.docx", enabled=True, has_addendum=False)
  - criminal_docketing_statement_attachment: ALDocument.using(title="Criminal docketing statement", filename="criminal_docketing_statement", enabled=True, has_addendum=False, )
---
# Bundles group the ALDocuments into separate downloads, such as for court and for the user
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[criminal_docketing_statement_Post_interview_instructions, criminal_docketing_statement_attachment], filename="criminal_docketing_statement", title="All forms to download for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=[criminal_docketing_statement_attachment],  filename="criminal_docketing_statement", title="All forms to deliver to court", enabled=True)
---
# Each attachment defines a key in an ALDocument. We use `i` as the placeholder here so the same template is 
# used for "preview" and "final" keys, and logic in the template checks the value of 
# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: criminal_docketing_statement_next_steps
  docx template file: criminal_docketing_statement_next_steps.docx
  variable name: criminal_docketing_statement_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
