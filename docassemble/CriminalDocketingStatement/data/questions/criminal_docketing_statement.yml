    none of the above: False
---
id: motion_suppress
question: |
  If the appeal involves a motion to suppress, did the judge enter findings?
subquestion: |
  A motion to suppress is a request made to the court, typically by the defendant, asking the judge to exclude certain evidence from being used at trial because it was obtained in violation of the defendant’s constitutional or statutory rights.

  If the judge grants the motion, the prosecution cannot use that evidence at trial. If the judge denies the motion, the evidence is admitted, but the defendant may challenge that ruling on appeal.

  When a judge “enters findings” on a motion to suppress, the judge makes an official record explaining both what facts the court believes occurred and how the law applies to those facts. 
yesno: motion_suppress
 
---
id: findings_type
question: |
  Are the findings the judge entered from the motion to suppress written or transcribed? 
subquestion: |
