id: impoundment_checkbox
question: |
  Impoundment information
subquestion: |
  Impoundment means that a document or part of a court record is kept confidential and not available to the public. The court restricts access to protect sensitive or private information.

  For this form, impounded documents include any part of the record that is impounded, sealed, or confidential by statute, court order, rule, or standing order. 
fields:  
  - Is any part of the record impounded?: record_impounded
    datatype: yesnoradio
      
  - Is the entire case impounded?: fully_impounded
    datatype: yesnoradio 
    show if:
      variable: record_impounded
      is: True
  - note: |
      If the entire case is impounded, type "entire case" below 
    show if: 
      variable: record_impounded
      is: True
  - List the documents that are impounded: impoundment_documents
    datatype: area
    show if: 
      variable: record_impounded
      is: True

---
id: impoundment_details_screen
question: |
  Impoundment authority
subquestion: |
   Select the authority for why the documents are impounded. You may select more than one. 
fields:
  - Impoundment authority: impoundment_details
    datatype: checkboxes
    choices: 
      - Abortion consent forms and materials. G. L. c. 112, § 12S. 
      - Abuse Prevention Orders. G. L. c. 209A, § 8.
      - Address Confidentiality Program Affidavits. S.J.C. Rule 1:20; G. L. c. 9A; 950 Code Mass. Regs. § 130. 
      - Adoptions. G. L. c. 210, § 5C.
      - Affidavits of Indigency. By Order of the S.J.C. on the Affidavit of Indigency form.
      - Alcohol and drug abuse program and treatment records. 42 U.S.C. § 1175, 290 dd-3. 
      - Appeals from the Sex Offender Registry Board. G. L. c. 6, § 178M.
      - Board of Bar Overseer proceedings. S.J.C. Rule 4:01, § 20(1).
      - Child in Need of Services/Child Requiring Assistance. G. L. c. 119, § 39E-39I. 
      - Child Protection Orders. G. L. c. 119, § 38.
      - Commission on Judicial Conduct Proceedings. G. L. c. 211C, § 6.
      - Court Order of Impoundment
      - Delinquency Proceedings. G. L. c. 119, § 60A.
      - Department of Workforce Development Hearings (unemployment hearings). G. L. c. 151A, § 46. 
      - Financial statements. Supplemental Probate and Family Court Rule 401(d).
      - Grand Jury minutes or documents. G. L. c. 268, § 13D(e).
      - Guardian ad Litem Reports. Probate and Family Court Standing Order 2-08. 
      - Harassment Prevention Orders. G. L. c. 258E, § 10.
      - Inquest Report and Transcript. G. L. c. 38, § 10; In re Globe Newspaper Co., Inc., 461 Mass. 113 (2011). 
      - Juror Questionnaires. G.L. c. 234A, §§ 23, 33.
      - Juvenile Trials. G. L. c. 119, § 65. 
      - Mediator Records. G. L. c. 233, § 23C.
      - Medical Certificates and Clinical Team Reports. Probate and Family Court Standing Order 5-08. 
      - Medical, Health and Hospital Records. G. L. c. 111, § 70, § 70E(b).
      - Mental Health Reports. G. L. c. 123, §§ 1-18, 35.
      - Medical Peer Review Committee. G. L. c. 111, § 204. 
      - Paternity actions. G. L. c. 209C, § 13.
      - Pending or Denied Criminal Complaint Applications. District Court Standards of Judicial Practice, The Complaint Procedure §§ 3:15 and 5:02 (rev. 2008).
      - Personal Medical Information. Probate and Family Court Standing Order 1-09, Article V of G.L. c. 190B. 
      - Photographs of unsuspecting nude person. G. L. c. 272, § 105(g).
      - Presentence Probation Reports. Mass. R. Crim. P. 28(d)(3); Commonwealth v. Martin, 355 Mass. 296 (1969) 
      - Probation Records. G. L. c. 276, § 100.
      - Psychotherapist Treatment Records. G.L. c. 112, § 129A, except as provided by G.L. c. 233, § 20(b).
      - Qualified Domestic Relation Orders. Probate and Family Court Standing Order 3-08.
      - Records deposited with the clerk-magistrate as potential exhibits. See generally G. L. c. 233, § 79J; G.L. c. 233, § 79; Commonwealth v. Dwyer, 448 Mass. 122, 148-149 (2006).
      - Rights afforded victims, witnesses, or family members. G. L. c. 258B, § 3(h). 
      - School records. G. L. c. 71, § 34H; G. L. c. 208, § 31.
      - Search Warrant, application, or affidavit, before return. G. L. c. 276, § 2B. 
      - Social Worker records. G. L. c. 112, § 135A.
      - Trade secrets and other confidential matters in connection with discovery. Mass. R. Civ. P. 26(c)(7).
      - Victim's name in Sexual Assault Record. G. L c. 265, § 24C; G. L. c. 264, §§ 13B, 13B ½, 13B ¾; G. L. c. 265, §§ 22, 23, 23A, 23B; G. L. c. 265, §§ 22A, 22B, 22C; G. L. c. 265, § 24; G. L. c. 265, § 24B.
      - Victim program locations. G. L. c. 233, §§ 20J and 20K. 
    none of the above: False
