id: nature_of_appeal
question: |
  Please select the nature of the appeal. 
subquestion: |
  A **Commonwealth’s Appeal** is when the prosecution, not the defendant, is the party appealing.

  A **Defendant’s Direct Appeal** is the first appeal a defendant files after being convicted or sentenced.

  A **Defendant’s Collateral Appeal** is different from a direct appeal. It is usually filed after the direct appeal has been decided or after the time to file one has passed. It is called collateral because it challenges the conviction through a separate post-conviction process rather than through the standard direct appeal.

fields:
  - Nature of the appeal: nature_of_appeal
    datatype: radio
    choices:
      - Commonwealth's Appeal: commonwealth
      - Defendant's Direct Appeal: direct
      - Defendant's Collateral Appeal: collateral
---
